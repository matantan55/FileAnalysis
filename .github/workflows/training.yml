name: ThreatNet Training

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    # Run only if triggered manually OR if the push commit message contains --train
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '--train'))
    permissions:
      contents: write # Required for committing files and creating releases
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to push commits

      - name: Cache Dataset Features
        uses: actions/cache@v4
        with:
          path: dataset_cache.npz
          key: dataset-features-${{ runner.os }}-${{ hashFiles('fileanalysis/scoring/features.py') }}
          restore-keys: |
            dataset-features-${{ runner.os }}-
            
      - name: Build Sandbox Docker Image
        run: docker build -t fileanalysis-sandbox -f Dockerfile.sandbox .

      - name: Run Cloud Training Pipeline
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            fileanalysis-sandbox

      - name: Check for Model Updates
        id: check_changes
        run: |
          git add fileanalysis/scoring/threat_model_malconv.pt fileanalysis/scoring/threat_model_lgb.txt fileanalysis/scoring/feature_scaler.npz || true
          if git diff --staged --quiet; then
            echo "No changes detected in model weights."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Model weights updated!"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Updated Model
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fileanalysis/scoring/threat_model_malconv.pt fileanalysis/scoring/threat_model_lgb.txt fileanalysis/scoring/feature_scaler.npz
          git commit -m "🤖 Automate ThreatNet model retraining"
          git push

      - name: Create GitHub Release
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d')"
          # In case of multiple runs on the same day, append the run number
          RELEASE_TAG="${DATE_TAG}.${{ github.run_number }}"
          
          gh release create "$RELEASE_TAG" \
            --title "ThreatNet Model Release $RELEASE_TAG" \
            --notes "Automated ThreatNet retraining run on aggregated malware datasets." \
            fileanalysis/scoring/threat_model_malconv.pt fileanalysis/scoring/threat_model_lgb.txt fileanalysis/scoring/feature_scaler.npz
