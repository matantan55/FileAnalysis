name: Daily ThreatNet Training

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing files and creating releases
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to push commits



      - name: Build Sandbox Docker Image
        run: docker build -t fileanalysis-sandbox -f Dockerfile.sandbox .

      - name: Run Cloud Training Pipeline
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            fileanalysis-sandbox

      - name: Check for Model Updates
        id: check_changes
        run: |
          if git diff --exit-code fileanalysis/scoring/threat_model.pt fileanalysis/scoring/feature_scaler.npz; then
            echo "No changes detected in model weights."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Model weights updated!"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Updated Model
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fileanalysis/scoring/threat_model.pt fileanalysis/scoring/feature_scaler.npz
          git commit -m "🤖 Automate daily ThreatNet model retraining"
          git push

      - name: Create GitHub Release
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d')"
          # In case of multiple runs on the same day, append the run number
          RELEASE_TAG="${DATE_TAG}.${{ github.run_number }}"
          
          gh release create "$RELEASE_TAG" \
            --title "ThreatNet Model Release $RELEASE_TAG" \
            --notes "Automated daily ThreatNet retraining run on aggregated malware datasets." \
            fileanalysis/scoring/threat_model.pt fileanalysis/scoring/feature_scaler.npz
